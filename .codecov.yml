codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 85%
        threshold: 1%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: false

  # Exclude files that are framework/UI code with low testing value
  ignore:
    - "src/quads_client/shell.py"           # Interactive REPL - requires integration tests with cmd2
    - "src/quads_client/rich_console.py"   # Thin wrapper around Rich library methods
    - "src/quads_client/progress.py"       # Progress display utility - UI/framework code
    - "tests/**"                            # Test files themselves
    - "setup.py"                            # Setup script

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
