name: Sync Back to Development

on:
  workflow_run:
    workflows: ["Semantic Release"]
    types:
      - completed

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into development
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin
          git checkout development
          git merge origin/main
          git push origin development

      - name: Update RPM spec version
        run: |
          # Extract version from __init__.py
          VERSION=$(grep -oP "^__version__ = ['\"]([^'\"]+)['\"]" src/quads_client/__init__.py | grep -oP "[0-9]+\.[0-9]+\.[0-9]+")
          echo "Extracted version: $VERSION"

          # Update the spec file
          sed -i "s/^%define version.*/%define version $VERSION/" rpm/quads-client.spec

          # Commit and push if there are changes
          git add rpm/quads-client.spec
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: update RPM spec version to $VERSION"
            git push origin development
          fi
